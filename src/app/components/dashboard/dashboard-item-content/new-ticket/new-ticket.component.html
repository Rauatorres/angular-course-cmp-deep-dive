<form id="new-ticket" (ngSubmit)="onSubmit(titleElement)">
  <app-control label="Title">
    <input name="title" id="title" #titleElement />
  </app-control>
  <app-control label="Request">
    <textarea name="request" id="request" rows="3"></textarea>
  </app-control>
  <p>
    <button appButton>
      Submit
      <span ngProjectAs="icon"> ⌲ </span>
    </button>
  </p>
</form>
