<div id="dashboard">
  <app-dashboard-item
    [img]="{ src: 'status.png', alt: 'A signal symbol' }"
    title="Server Status"
  >
    <app-server-status />
  </app-dashboard-item>

  <app-dashboard-item
    [img]="{ src: 'globe.png', alt: 'A globe' }"
    title="Traffic"
  >
    <div id="traffic">
      <p>Last 7 days</p>

      <app-traffic />
    </div>
  </app-dashboard-item>

  <app-dashboard-item
    [img]="{ src: 'list.png', alt: 'A list of items' }"
    title="Support Ticket"
  >
    <app-tickets />
  </app-dashboard-item>
</div>
